<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acesse sua conta E-conomia CRM.">
  <title>Login — E-CONOMIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <script src="js/theme.js" type="module"></script>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
    }
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }
    .login-logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .login-logo-icon svg { width: 22px; height: 22px; color: var(--primary-foreground); }
    .login-logo h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; color: var(--foreground); }
    .login-logo p  { font-size: 13px; color: var(--muted-foreground); margin: 0; }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .form-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--secondary);
      padding: 4px;
      border-radius: var(--radius);
    }
    .form-tab {
      padding: 7px;
      border: none;
      border-radius: calc(var(--radius) - 2px);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted-foreground);
      transition: background 0.15s, color 0.15s;
    }
    .form-tab.active {
      background: var(--card);
      color: var(--foreground);
      box-shadow: var(--shadow);
    }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--foreground);
      margin-bottom: 5px;
    }

    .error-box {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--destructive) 10%, transparent);
      color: var(--destructive);
      border-radius: var(--radius);
      font-size: 12.5px;
      margin-bottom: 14px;
    }
    .error-box.show { display: flex; }
    .error-box svg { width: 14px; height: 14px; flex-shrink: 0; }

    .success-box {
      display: none;
      padding: 10px 12px;
      background: var(--success-light);
      color: var(--success);
      border-radius: var(--radius);
      font-size: 12.5px;
      margin-bottom: 14px;
    }
    .success-box.show { display: block; }

    .btn-google {
      width: 100%;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-google:hover { background: var(--secondary); }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-google svg { width: 16px; height: 16px; flex-shrink: 0; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      font-size: 11.5px;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .or-divider::before,
    .or-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .form-footer {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .theme-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted-foreground);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.1s;
    }
    .theme-btn:hover { color: var(--foreground); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h1>E-CONOMIA</h1>
        <p>Gestão de vendas multicanal</p>
      </div>

      <div class="form-card">
        <!-- Tabs -->
        <div class="form-tabs">
          <button class="form-tab active" onclick="showTab('login')">Entrar</button>
          <button class="form-tab" onclick="showTab('register')">Criar conta</button>
        </div>

        <!-- Login -->
        <div id="tab-login">
          <div id="login-error" class="error-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="login-error-msg"></span>
          </div>

          <button id="login-google-btn" class="btn-google" onclick="handleGoogle()">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            Continuar com Google
          </button>

          <div class="or-divider">ou</div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="input" type="email" id="email" placeholder aria-label="Endereço de e-mail"="seu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Senha</label>
            <input class="input" type="password" id="password" placeholder aria-label="Senha"="Sua senha" autocomplete="current-password">
          </div>

          <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;height:38px;margin-top:4px;" onclick="handleLogin()">
            Entrar
          </button>
        </div>

        <!-- Register -->
        <div id="tab-register" style="display:none">
          <div id="reg-error" class="error-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="reg-error-msg"></span>
          </div>
          <div id="reg-success" class="success-box"></div>

          <button id="register-google-btn" class="btn-google" onclick="handleGoogle()">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            Cadastrar com Google
          </button>

          <div class="or-divider">ou</div>

          <div class="form-group">
            <label class="form-label" for="reg-name">Nome</label>
            <input class="input" type="text" id="reg-name" placeholder="Seu nome">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input class="input" type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-org">Nome da loja / empresa</label>
            <input class="input" type="text" id="reg-org" placeholder="Minha Loja">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Senha</label>
            <input class="input" type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
          </div>

          <button id="register-btn" class="btn btn-primary" style="width:100%;justify-content:center;height:38px;margin-top:4px;" onclick="handleRegister()">
            Criar conta
          </button>
        </div>
      </div>

      <div class="form-footer">
        <button class="theme-btn" id="themeToggle" aria-label="Alternar tema" title="Alternar tema"></button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, signIn, signUp, signInWithGoogle, getCurrentUser } from './js/supabase-client.js';
    import { initThemeToggle } from './js/theme.js';

    initThemeToggle('themeToggle');

    const user = await getCurrentUser();
    if (user) window.location.href = 'dashboard.html';

    window.showTab = (tab) => {
      document.getElementById('tab-login').style.display    = tab === 'login'    ? '' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
      document.querySelectorAll('.form-tab').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
    };

    window.handleGoogle = async () => {
      const isLogin = document.getElementById('tab-register').style.display === 'none';
      const errEl  = document.getElementById(isLogin ? 'login-error' : 'reg-error');
      const errMsg = document.getElementById(isLogin ? 'login-error-msg' : 'reg-error-msg');
      const btns   = document.querySelectorAll('.btn-google');

      errEl.classList.remove('show');
      btns.forEach(b => { b.disabled = true; });

      const { error } = await signInWithGoogle();
      if (error) {
        errMsg.textContent = error.message || 'Falha ao iniciar login com Google.';
        errEl.classList.add('show');
        btns.forEach(b => { b.disabled = false; });
      }
      // Em sucesso, navegador já foi redirecionado para o consent do Google.
    };

    window.handleLogin = async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');
      const errMsg   = document.getElementById('login-error-msg');
      const btn      = document.getElementById('login-btn');

      errEl.classList.remove('show');
      if (!email || !password) {
        errMsg.textContent = 'Preencha email e senha.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const { error } = await signIn(email, password);
      if (error) {
        errMsg.textContent = error.message === 'Invalid login credentials'
          ? 'Email ou senha incorretos.'
          : error.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      } else {
        window.location.href = 'dashboard.html';
      }
    };

    window.handleRegister = async () => {
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const orgName  = document.getElementById('reg-org').value.trim();
      const password = document.getElementById('reg-password').value;
      const errEl    = document.getElementById('reg-error');
      const errMsg   = document.getElementById('reg-error-msg');
      const succEl   = document.getElementById('reg-success');
      const btn      = document.getElementById('register-btn');

      errEl.classList.remove('show');
      if (!name || !email || !password || !orgName) {
        errMsg.textContent = 'Preencha todos os campos.';
        errEl.classList.add('show');
        return;
      }
      if (password.length < 6) {
        errMsg.textContent = 'Senha precisa ter no mínimo 6 caracteres.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Criando conta...';

      const { data, error } = await signUp(email, password, name);
      if (error) {
        errMsg.textContent = error.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Criar conta';
        return;
      }

      if (data.user) {
        const slug = orgName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        try {
          // Tenta via RPC (corrige chicken-and-egg RLS)
          await supabase.rpc('create_organization_with_member', { org_name: orgName, org_slug: slug });
        } catch {
          // Fallback direto (funciona se RLS estiver relaxada)
          const { data: org } = await supabase.from('organizations').insert({ name: orgName, slug }).select('id').single();
          if (org) await supabase.from('org_members').insert({ organization_id: org.id, user_id: data.user.id, role: 'owner', accepted_at: new Date().toISOString() });
        }
      }

      succEl.textContent = 'Conta criada! Verifique seu email para confirmar.';
      succEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Criar conta';
    };

    // Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const tab = document.getElementById('tab-register').style.display === 'none' ? 'login' : 'register';
      tab === 'login' ? window.handleLogin() : window.handleRegister();
    });
  </script>
</body>
</html>
