[api]
enabled = true
port = 54321
schemas = ["public", "storage"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.email.smtp]
enabled = true
host = "email-smtp.us-east-1.amazonaws.com"
port = 465
user = "env(AWS_SES_USER)"
pass = "env(AWS_SES_PASS)"
admin_email = "admin@e-conomia.com"
sender_name = "E-conomia CRM"

[db]
major_version = 15

[realtime]
enabled = true

[storage]
enabled = true
