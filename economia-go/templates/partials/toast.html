{{define "toast-success"}}
<div class="badge badge-success" style="padding:10px 14px;font-size:13px;border-radius:var(--radius);">
  &#10003; {{.}}
</div>
{{end}}

{{define "toast-error"}}
<div class="badge badge-danger" style="padding:10px 14px;font-size:13px;border-radius:var(--radius);">
  &#10007; {{.}}
</div>
{{end}}
