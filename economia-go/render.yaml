services:
  - type: web
    name: economia-app
    runtime: go
    region: oregon
    plan: free
    buildCommand: go build -o bin/server ./cmd/server
    startCommand: ./bin/server
    rootDir: economia-go
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: economia-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: ML_CLIENT_ID
        sync: false
      - key: ML_CLIENT_SECRET
        sync: false
      - key: OLIST_CLIENT_ID
        sync: false
      - key: OLIST_CLIENT_SECRET
        sync: false
      - key: OMIE_APP_KEY
        sync: false
      - key: OMIE_APP_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

databases:
  - name: economia-db
    plan: free
    databaseName: economia
    user: economia_user
    region: oregon
